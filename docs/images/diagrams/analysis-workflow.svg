<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="980" viewBox="0 0 1200 980" role="img" aria-labelledby="title desc">
  <title id="title">AI Resume Analyzer analysis workflow</title>
  <desc id="desc">The verified workflow from authentication and upload through validation, parsing, matching, semantic analysis, recommendations, feedback, persistence, and presentation.</desc>
  <defs><linearGradient id="step" x1="0" x2="1"><stop stop-color="#182b4b"/><stop offset="1" stop-color="#102039"/></linearGradient><marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L9,3 L0,6 Z" fill="#65e0c4"/></marker></defs>
  <rect width="1200" height="980" fill="#08111f"/><text x="60" y="55" fill="#e7edf7" font-family="Arial,sans-serif" font-size="29" font-weight="700">Resume analysis workflow</text>
  <g font-family="Arial,sans-serif" text-anchor="middle" font-size="16"><g fill="url(#step)" stroke="#6679ff"><rect x="390" y="90" width="420" height="55" rx="12"/><rect x="390" y="175" width="420" height="55" rx="12"/><rect x="390" y="260" width="420" height="55" rx="12"/><rect x="390" y="345" width="420" height="55" rx="12"/><rect x="390" y="430" width="420" height="55" rx="12"/><rect x="390" y="515" width="420" height="55" rx="12"/><rect x="390" y="600" width="420" height="55" rx="12"/><rect x="390" y="685" width="420" height="55" rx="12"/><rect x="390" y="770" width="420" height="55" rx="12"/><rect x="390" y="855" width="420" height="55" rx="12"/></g><g fill="#fff"><text x="600" y="125">1. Authenticate user</text><text x="600" y="210">2. Upload PDF or DOCX resume</text><text x="600" y="295">3. Validate type, signature, size, and content</text><text x="600" y="380">4. Extract text and structured information</text><text x="600" y="465">5. Extract and compare skills</text><text x="600" y="550">6. Optional job-description analysis</text><text x="600" y="635">7. ATS-style and TF-IDF analysis</text><text x="600" y="720">8. Optional semantic similarity and role ranking</text><text x="600" y="805">9. Resume advisor feedback and aggregation</text><text x="600" y="890">10. Persist private report and present dashboard</text></g></g>
  <g stroke="#65e0c4" stroke-width="3" marker-end="url(#arrow)"><path d="M600 145v30"/><path d="M600 230v30"/><path d="M600 315v30"/><path d="M600 400v30"/><path d="M600 485v30"/><path d="M600 570v30"/><path d="M600 655v30"/><path d="M600 740v30"/><path d="M600 825v30"/></g>
  <g font-family="Arial,sans-serif" font-size="14"><rect x="880" y="500" width="250" height="120" rx="12" fill="#132641" stroke="#65e0c4"/><text x="1005" y="535" text-anchor="middle" fill="#dfe5ff">Optional path</text><text x="1005" y="562" text-anchor="middle" fill="#9eacc0">Job description enables</text><text x="1005" y="585" text-anchor="middle" fill="#9eacc0">comparison; model-backed</text><text x="1005" y="608" text-anchor="middle" fill="#9eacc0">features need model access.</text><path d="M810 542h70" stroke="#65e0c4" stroke-width="2" marker-end="url(#arrow)"/></g>
</svg>
