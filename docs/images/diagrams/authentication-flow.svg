<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="620" viewBox="0 0 1200 620" role="img" aria-labelledby="title desc">
  <title id="title">AI Resume Analyzer authentication flow</title>
  <desc id="desc">Registration and login validate credentials, hash passwords, persist users, issue JWTs, and protect bearer-token requests and user-scoped history.</desc>
  <defs><linearGradient id="box" x1="0" x2="1"><stop stop-color="#182b4b"/><stop offset="1" stop-color="#102039"/></linearGradient><marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L9,3 L0,6 Z" fill="#65e0c4"/></marker></defs>
  <rect width="1200" height="620" fill="#08111f"/><text x="60" y="55" fill="#e7edf7" font-family="Arial,sans-serif" font-size="29" font-weight="700">Authentication and ownership flow</text>
  <g font-family="Arial,sans-serif" text-anchor="middle"><rect x="70" y="120" width="285" height="90" rx="14" fill="url(#box)" stroke="#6679ff"/><text x="212" y="157" fill="#fff" font-size="19" font-weight="700">Registration</text><text x="212" y="183" fill="#b8c6d9" font-size="14">validate → Argon2 hash → user row</text><rect x="457" y="120" width="285" height="90" rx="14" fill="url(#box)" stroke="#6679ff"/><text x="599" y="157" fill="#fff" font-size="19" font-weight="700">Login</text><text x="599" y="183" fill="#b8c6d9" font-size="14">verify → create JWT bearer token</text><rect x="845" y="120" width="285" height="90" rx="14" fill="url(#box)" stroke="#65e0c4"/><text x="987" y="157" fill="#fff" font-size="19" font-weight="700">Frontend session</text><text x="987" y="183" fill="#b8c6d9" font-size="14">localStorage token + Axios header</text><rect x="270" y="360" width="660" height="110" rx="16" fill="#102039" stroke="#65e0c4"/><text x="600" y="400" fill="#fff" font-size="20" font-weight="700">Protected request</text><text x="600" y="428" fill="#b8c6d9" font-size="14">Bearer token → JWT validation → authenticated user dependency</text><text x="600" y="452" fill="#b8c6d9" font-size="14">User-scoped analysis and history access</text></g>
  <g stroke="#65e0c4" stroke-width="3" marker-end="url(#arrow)"><path d="M355 165h100"/><path d="M742 165h95"/><path d="M987 210v145"/><path d="M599 210v145"/></g><text x="600" y="535" fill="#8496af" text-anchor="middle" font-family="Arial,sans-serif" font-size="14">JWTs are access tokens; this repository does not implement refresh tokens or cookie authentication.</text>
</svg>
