name: Continuous Integration

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      run_semantic_tests:
        description: Run tests that download the configured semantic model
        required: false
        default: false
        type: boolean

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  backend-tests:
    name: Backend tests and coverage
    runs-on: ubuntu-latest
    timeout-minutes: 30

    defaults:
      run:
        working-directory: backend

    env:
      APP_ENVIRONMENT: testing
      DEBUG: "false"
      DATABASE_URL: sqlite:///./ci_test.db
      JWT_SECRET_KEY: ci-only-secret-key-that-is-long-enough-for-tests
      JWT_ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: "60"
      CORS_ORIGINS: '["http://localhost:3000"]'
      ALLOW_LOCALHOST_ORIGIN_REGEX: "false"
      MAXIMUM_FILE_SIZE_MB: "5"
      SEMANTIC_MODEL_NAME: sentence-transformers/all-MiniLM-L6-v2
      SEMANTIC_MODEL_LOCAL_ONLY: "true"
      LOG_LEVEL: WARNING

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            backend/requirements-runtime.txt
            backend/requirements-dev.txt

      - name: Install backend development dependencies
        run: python -m pip install -r requirements-dev.txt

      - name: Apply SQLite migrations
        run: python -m alembic upgrade head

      - name: Run non-semantic tests with coverage
        run: >-
          python -m pytest -m "not semantic"
          --cov=app
          --cov-report=term-missing
          --cov-report=xml:coverage.xml

      - name: Upload backend coverage report
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: backend/coverage.xml
          if-no-files-found: error
          retention-days: 14

  semantic-tests:
    name: Semantic model tests (manual)
    if: >-
      github.event_name == 'workflow_dispatch' &&
      inputs.run_semantic_tests
    runs-on: ubuntu-latest
    timeout-minutes: 45

    defaults:
      run:
        working-directory: backend

    env:
      APP_ENVIRONMENT: testing
      DEBUG: "false"
      DATABASE_URL: sqlite:///./semantic_ci_test.db
      JWT_SECRET_KEY: ci-only-secret-key-that-is-long-enough-for-tests
      JWT_ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: "60"
      CORS_ORIGINS: '["http://localhost:3000"]'
      ALLOW_LOCALHOST_ORIGIN_REGEX: "false"
      SEMANTIC_MODEL_NAME: sentence-transformers/all-MiniLM-L6-v2
      SEMANTIC_MODEL_LOCAL_ONLY: "false"
      HF_HOME: ${{ github.workspace }}/.cache/huggingface
      LOG_LEVEL: WARNING

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            backend/requirements-runtime.txt
            backend/requirements-dev.txt

      - name: Cache semantic model
        uses: actions/cache@v4
        with:
          path: .cache/huggingface
          key: semantic-model-${{ runner.os }}-${{ hashFiles('backend/requirements-runtime.txt') }}

      - name: Install backend development dependencies
        run: python -m pip install -r requirements-dev.txt

      - name: Run semantic tests
        run: python -m pytest -m semantic

  frontend-tests:
    name: Frontend lint, tests, and build
    runs-on: ubuntu-latest
    timeout-minutes: 20

    defaults:
      run:
        working-directory: frontend

    env:
      VITE_API_BASE_URL: /api

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci --no-audit --no-fund

      - name: Run ESLint
        run: npm run lint

      - name: Run frontend tests
        run: npm run test:run

      - name: Build frontend
        run: npm run build

  docker-validation:
    name: Validate Docker builds
    needs:
      - backend-tests
      - frontend-tests
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Validate Docker Compose configuration
        env:
          POSTGRES_DB: resume_analyzer_ci
          POSTGRES_USER: resume_ci
          POSTGRES_PASSWORD: ci-only-database-password
          JWT_SECRET_KEY: ci-only-docker-secret-key-that-is-long-enough
          JWT_ALGORITHM: HS256
          ACCESS_TOKEN_EXPIRE_MINUTES: "60"
        run: docker compose -f compose.yaml config --quiet

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: false
          tags: ai-resume-analyzer-backend:ci
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

      - name: Build frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          build-args: |
            VITE_API_BASE_URL=/api
          push: false
          tags: ai-resume-analyzer-frontend:ci
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend
