name: Publish Docker Images

on:
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: docker-publish-${{ github.ref }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io

jobs:
  publish:
    name: Build and Publish
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set lowercase image owner
        id: repository
        shell: bash
        run: |
          echo "owner=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: |
          npm ci --no-audit --no-fund

      - name: Test frontend
        working-directory: frontend
        run: |
          npm run lint
          npm run test:run

      - name: Build frontend production files
        working-directory: frontend
        env:
          VITE_API_BASE_URL: /api
        run: |
          npm run build

      - name: Verify frontend build
        run: |
          test -f frontend/dist/index.html
          test -d frontend/dist/assets

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate backend Docker metadata
        id: backend-meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ env.REGISTRY }}/${{ steps.repository.outputs.owner }}/ai-resume-analyzer-backend

          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

          labels: |
            org.opencontainers.image.title=AI Resume Analyzer Backend
            org.opencontainers.image.description=FastAPI backend for AI Resume Analyzer
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}

      - name: Generate frontend Docker metadata
        id: frontend-meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ env.REGISTRY }}/${{ steps.repository.outputs.owner }}/ai-resume-analyzer-frontend

          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

          labels: |
            org.opencontainers.image.title=AI Resume Analyzer Frontend
            org.opencontainers.image.description=React frontend for AI Resume Analyzer
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}

      - name: Build and publish backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: ${{ steps.backend-meta.outputs.tags }}
          labels: ${{ steps.backend-meta.outputs.labels }}
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend
          provenance: true
          sbom: true

      - name: Build and publish frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: ${{ steps.frontend-meta.outputs.tags }}
          labels: ${{ steps.frontend-meta.outputs.labels }}
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend
          provenance: true
          sbom: true
